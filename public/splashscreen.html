<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>tsp</title>
    <style>
      :root {
        --splash-bg: #0f172a;
        --splash-fg: #f8fafc;
        --splash-muted: rgba(248, 250, 252, 0.55);
        --splash-ring: rgba(248, 250, 252, 0.18);
      }
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: var(--splash-bg);
        color: var(--splash-fg);
        font-family:
          "Inter",
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          sans-serif;
        letter-spacing: -0.01em;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        overflow: hidden;
        user-select: none;
        -webkit-user-select: none;
      }
      .splash {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        padding: 24px;
        text-align: center;
      }
      .splash__logo {
        width: 104px;
        height: 104px;
        display: grid;
        place-items: center;
        border-radius: 26px;
        background: linear-gradient(145deg, #2563eb, #7c3aed);
        box-shadow: 0 10px 28px rgba(37, 99, 235, 0.36);
        color: #fff;
        font-size: 40px;
        font-weight: 700;
      }
      .splash__title {
        margin: 0;
        font-size: 22px;
        font-weight: 700;
        color: #f8fafc;
      }
      .splash__hint {
        margin: 0;
        font-size: 12px;
        color: var(--splash-muted);
      }
      .spinner {
        width: 28px;
        height: 28px;
        border-radius: 50%;
        border: 2.5px solid var(--splash-ring);
        border-top-color: currentColor;
        animation: spin 0.9s linear infinite;
        color: var(--splash-fg);
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      @media (prefers-reduced-motion: reduce) {
        .spinner {
          animation-duration: 2.5s;
        }
      }
    </style>
  </head>
  <body>
    <div class="splash" role="status" aria-live="polite" aria-label="Loading tsp">
      <div class="splash__logo" aria-hidden="true">T</div>
      <h1 class="splash__title">tsp</h1>
      <div class="spinner" aria-hidden="true"></div>
      <p class="splash__hint">Loading tsp...</p>
    </div>
  </body>
</html>
