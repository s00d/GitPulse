name: Feature request
description: Suggest an improvement or new capability
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        For open-ended feedback, consider [Discussions](https://github.com/s00d/GitPulse/discussions) instead.

  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What workflow is painful today?
      placeholder: I check GitHub for X several times a day and ...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      placeholder: GitPulse could ...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: GitHub Mobile, email, other tray apps, etc.
