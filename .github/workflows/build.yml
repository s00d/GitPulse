name: Build and Release Tauri App

on:
  workflow_dispatch:

jobs:
  create-release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create-release.outputs.result }}
    steps:
      - uses: actions/checkout@v4

      - name: Read package version
        run: echo "PACKAGE_VERSION=$(node -p "JSON.parse(require('fs').readFileSync('package.json','utf8')).version")" >> "$GITHUB_ENV"

      - name: Create or reuse draft release
        id: create-release
        uses: actions/github-script@v7
        env:
          PACKAGE_VERSION: ${{ env.PACKAGE_VERSION }}
        with:
          script: |
            const tag = `app-v${process.env.PACKAGE_VERSION}`;
            const { owner, repo } = context.repo;

            const { data: releases } = await github.rest.repos.listReleases({
              owner,
              repo,
              per_page: 100,
            });

            const existing = releases.find((release) => release.tag_name === tag && release.draft);
            if (existing) {
              core.info(`Reusing draft release ${existing.id} for ${tag}`);
              return existing.id;
            }

            const { data } = await github.rest.repos.createRelease({
              owner,
              repo,
              tag_name: tag,
              name: `Release v${process.env.PACKAGE_VERSION}`,
              body: "See the assets to download this version and install.",
              draft: true,
              prerelease: false,
            });

            core.info(`Created draft release ${data.id} for ${tag}`);
            return data.id;

  build-tauri:
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target universal-apple-darwin
            os: macos
          - platform: ubuntu-22.04
            args: ''
            os: linux
          - platform: windows-latest
            args: ''
            os: windows
          - platform: windows-latest
            args: --target i686-pc-windows-msvc
            suffix: windows

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || matrix.platform == 'windows-latest' && 'i686-pc-windows-msvc,x86_64-pc-windows-msvc' || '' }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ matrix.os }}-${{ matrix.args }}

      - name: Export signing key (unix)
        if: matrix.platform != 'windows-latest'
        run: echo "TAURI_SIGNING_PRIVATE_KEY=${{ secrets.TAURI_PRIVATE_KEY }}" >> $GITHUB_ENV

      - name: Export signing key (windows)
        if: matrix.platform == 'windows-latest'
        run: echo "TAURI_SIGNING_PRIVATE_KEY=${{ secrets.TAURI_PRIVATE_KEY }}" >> $GITHUB_ENV
        shell: bash

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev

      - name: Install frontend dependencies
        run: pnpm install

      - name: Prepare OAuth config
        run: echo "{\"github_client_id\":\"${{ secrets.GITPULSE_GITHUB_CLIENT_ID }}\"}" > src-tauri/config/oauth.json

      - name: Import Apple code signing certificates
        if: matrix.platform == 'macos-latest'
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          keychain: build

      - name: Set APPLE_SIGNING_IDENTITY from imported certificate
        if: matrix.platform == 'macos-latest'
        run: |
          security find-identity -v -p codesigning
          ID=$(security find-identity -v -p codesigning | grep "Developer ID Application" | head -1 | awk -F'"' '{print $2}')
          if [ -z "$ID" ]; then
            echo "No Developer ID Application identity found after import."
            exit 1
          fi
          echo "APPLE_SIGNING_IDENTITY=$ID" >> "$GITHUB_ENV"

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_SIGNING_IDENTITY: ${{ env.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          appName: gitpulse_${{ matrix.os }}
          args: ${{ matrix.args }}
          includeUpdaterJson: true
          updaterJsonPreferNsis: true
          includeDebug: false
          includeRelease: true
